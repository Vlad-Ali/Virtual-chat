events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    limit_req_zone $binary_remote_addr zone=chat_limit:10m rate=5r/s;
    limit_conn_zone $binary_remote_addr zone=chat_conn:10m;

    server {
        listen 80;
        server_name localhost;

        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;
        }

        location /api/chat {
            proxy_pass http://virtual-chat:8080;

            limit_req zone=chat_limit burst=10 nodelay;
            limit_conn chat_conn 3;

            limit_req_status 429;
            limit_conn_status 429;

            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }
    }
}